<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Congratulations!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Trebuchet MS', sans-serif;
    background: radial-gradient(circle at 50% 20%, #24405e 0%, #142238 55%, #0c1626 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas#confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }
  .card {
    position: relative;
    z-index: 3;
    width: 560px;
    max-width: 90vw;
    padding: 48px 44px 40px;
    border-radius: 18px;
    background: linear-gradient(160deg, #fdfaf3 0%, #f7f0dd 100%);
    border: 2px solid #c9a24b;
    box-shadow: 0 30px 80px rgba(0,0,0,0.45), 0 0 0 6px rgba(201,162,75,0.15);
    text-align: center;
    opacity: 0;
    transform: translateY(24px) scale(0.96);
    animation: riseIn 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) 0.15s forwards;
  }
  @keyframes riseIn {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .badge {
    width: 64px; height: 64px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: #1a2f4b;
    border: 2px solid #c9a24b;
    box-shadow: 0 0 0 4px #fdfaf3, 0 0 0 6px #c9a24b;
    display: flex; align-items: center; justify-content: center;
    font-family: Georgia, serif; font-style: italic; font-weight: 700;
    color: #c9a24b; font-size: 19px;
    animation: pop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s both;
  }
  @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  .emoji-row { font-size: 30px; margin-bottom: 6px; letter-spacing: 8px; }
  .headline {
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #8a6d1f;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .congrats {
    font-size: 22px;
    color: #3d3a30;
    margin-bottom: 4px;
  }
  .student-name {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 44px;
    color: #1a2f4b;
    margin: 10px 0 16px;
    border-bottom: 2px solid #c9a24b;
    display: inline-block;
    padding-bottom: 8px;
    animation: glow 2.4s ease-in-out 1.2s infinite;
  }
  @keyframes glow {
    0%, 100% { text-shadow: 0 0 0 rgba(201,162,75,0); }
    50% { text-shadow: 0 0 18px rgba(201,162,75,0.55); }
  }
  .course-line {
    font-size: 14.5px;
    color: #6b6455;
    line-height: 1.6;
    margin-bottom: 22px;
  }
  .course-title {
    font-weight: 700;
    color: #8a6d1f;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tech-club {
    font-size: 14px;
    color: #1a2f4b;
    background: rgba(201,162,75,0.14);
    border: 1px solid #c9a24b;
    border-radius: 10px;
    padding: 10px 18px;
    margin: 0 0 22px;
    font-style: italic;
    line-height: 1.5;
  }
  .cta {
    display: inline-block;
    padding: 12px 28px;
    background: #1a2f4b;
    color: #f2d98c;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 999px;
    border: 1px solid #c9a24b;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .cta:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(26,47,75,0.35); }
  .footer-note {
    margin-top: 18px;
    font-size: 11px;
    color: #a39d86;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <canvas id="confetti"></canvas>
  <div class="card">
    <div class="badge">CWA</div>
    <div class="emoji-row">🎉 🎓 🎉</div>
    <div class="headline">Coding With Abdulhamid</div>
    <div class="congrats">Congratulations,</div>
    <div class="student-name" id="studentName">Abdulhamid Alghali</div>
    <div class="course-line">You have successfully completed<br><span class="course-title" id="courseTitle">Introduction to Python Programming for Beginners</span></div>
    <div class="tech-club">🚀 You're one step closer to entering the Tech Club!</div>
    <a class="cta" href="#" id="certLink" target="_blank" rel="noopener">View Your Certificate</a>
    <div class="footer-note">Verified completion &middot; Coding With Abdulhamid</div>
  </div>

<script>
  // Personalize from URL params, e.g. ?name=Jane%20Doe&course=Intro%20to%20Python
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name');
  const course = params.get('course');
  const cert = params.get('cert');
  if (name) document.getElementById('studentName').textContent = name;
  if (course) document.getElementById('courseTitle').textContent = course;

  const certLink = document.getElementById('certLink');
  if (cert) {
    certLink.setAttribute('href', cert);
  } else {
    // No certificate link provided yet — disable the button instead of a dead "#" link.
    certLink.style.opacity = '0.5';
    certLink.style.cursor = 'not-allowed';
    certLink.setAttribute('href', 'javascript:void(0)');
    certLink.addEventListener('click', (e) => e.preventDefault());
  }

  // Lightweight confetti (no external libraries)
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const colors = ['#c9a24b', '#1a2f4b', '#f2d98c', '#fdfaf3', '#8a6d1f'];
  const pieces = [];
  function spawn(count) {
    for (let i = 0; i < count; i++) {
      pieces.push({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * canvas.height * 0.3,
        w: 6 + Math.random() * 6,
        h: 10 + Math.random() * 8,
        color: colors[Math.floor(Math.random() * colors.length)],
        speedY: 1.5 + Math.random() * 2.5,
        speedX: -1 + Math.random() * 2,
        rotation: Math.random() * 360,
        rotationSpeed: -6 + Math.random() * 12,
      });
    }
  }
  spawn(140);
  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of pieces) {
      p.y += p.speedY;
      p.x += p.speedX;
      p.rotation += p.rotationSpeed;
      if (p.y > canvas.height + 20) {
        p.y = -20;
        p.x = Math.random() * canvas.width;
      }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate((p.rotation * Math.PI) / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    }
    frame++;
    if (frame % 240 === 0) spawn(30);
    requestAnimationFrame(animate);
  }
  animate();
</script>
</body>
</html>
